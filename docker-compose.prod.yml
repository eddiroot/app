name: eddi
services:
  db:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    ports:
      - 5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: eddi
    volumes:
      - dbdata:/var/lib/postgresql
    networks:
      - default

  obj:
    image: minio/minio
    restart: unless-stopped
    ports:
      - 9000
    environment:
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - objdata:/data
    networks:
      - default

  obj_buckets:
    image: minio/mc
    depends_on:
      - obj
    restart: 'no'
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc alias set myminio http://obj:9000 minio minio123;
      /usr/bin/mc mb myminio/schools;
      exit 0;
      "
    networks:
      - default

  app:
    build:
      context: .
      dockerfile: app.Dockerfile
    restart: unless-stopped
    ports:
      - 3000
    env_file:
      - path: .env
    depends_on:
      - db
      - obj
    networks:
      - default
      - dokploy-network

  fet:
    build:
      context: .
      dockerfile: fet.Dockerfile
    restart: unless-stopped
    networks:
      - default

volumes:
  dbdata:
  objdata:

networks:
  dokploy-network:
    external: true
  default:
    driver: bridge
